<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <!-- Background -->
  <rect width="300" height="80" fill="transparent"/>
  
  <!-- Mandazi Icon (left side) -->
  <g transform="translate(10, 5)">
    <!-- Outer circle -->
    <circle cx="35" cy="35" r="30" fill="#f59e0b" opacity="0.2"/>
    <circle cx="35" cy="35" r="25" fill="#f59e0b"/>
    <!-- Mandazi details -->
    <circle cx="35" cy="35" r="15" fill="#d97706"/>
    <circle cx="35" cy="35" r="6" fill="#92400e"/>
  </g>
  
  <!-- Text -->
  <text x="90" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1f2937">Mandazi</text>
  <text x="90" y="55" font-family="Arial, sans-serif" font-size="18" fill="#6b7280">Sales Tracker</text>
  
  <!-- Small chart icon -->
  <g transform="translate(220, 20)">
    <rect x="0" y="15" width="8" height="25" fill="#3b82f6" rx="2"/>
    <rect x="12" y="5" width="8" height="35" fill="#10b981" rx="2"/>
    <rect x="24" y="0" width="8" height="40" fill="#f59e0b" rx="2"/>
    <!-- Trend line -->
    <polyline points="4,18 16,8 28,5" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
