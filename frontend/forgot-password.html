<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Mandazi Sales Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner">
            <div class="spinner-ring"></div>
            <div class="loading-logo-container">
                <img src="assets/images/MSTS_logo_transparent.jpeg" alt="MSTS Logo" class="loading-logo">
            </div>
        </div>
        <p class="loading-text">Please wait...</p>
    </div>

    <div class="auth-container">
        <div class="auth-logo-wrapper">
            <img src="assets/images/MSTS_logo_transparent.jpeg" alt="Mandazi Sales Tracker Logo" class="auth-logo">
        </div>
        
        <div class="login-card">
            <h1>Reset Password</h1>
            <p class="subtitle">Verify your account to reset password</p>
            
            <!-- Step 1: Verify Account -->
            <div id="verify-section">
                <form id="verify-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Enter phone number" pattern="[0-9]{10,12}" required>
                    </div>
                    
                    <div id="verify-error" class="error-message hidden"></div>
                    
                    <button type="submit" class="btn btn-primary btn-full">Verify Account</button>
                </form>
            </div>
            
            <!-- Step 2: Reset Password -->
            <div id="reset-section" class="hidden">
                <form id="reset-form">
                    <input type="hidden" id="user-id" value="">
                    
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" name="newPassword" placeholder="Enter new password" minlength="6" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">Confirm New Password</label>
                        <input type="password" id="confirm-password" name="confirmPassword" placeholder="Confirm new password" required>
                    </div>
                    
                    <div id="reset-error" class="error-message hidden"></div>
                    <div id="reset-success" class="success-message hidden"></div>
                    
                    <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
                </form>
            </div>
            
            <div class="auth-switch">
                <p>Remember your password? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const API_URL = 'http://localhost:3001/api';
        let verifiedUserId = null;
        
        // Show message
        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.remove('hidden');
            setTimeout(() => element.classList.add('hidden'), 5000);
        }
        
        function showSuccess(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.remove('hidden');
        }
        
        // Handle verify form submission
        document.getElementById('verify-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            
            showLoadingScreen();
            
            try {
                const response = await fetch(`${API_URL}/auth/forgot-password/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, phoneNumber })
                });
                
                const data = await response.json();
                
                hideLoadingScreen();
                
                if (response.ok) {
                    // Account verified, show reset form
                    verifiedUserId = data.userId;
                    document.getElementById('user-id').value = data.userId;
                    document.getElementById('verify-section').classList.add('hidden');
                    document.getElementById('reset-section').classList.remove('hidden');
                } else {
                    showError('verify-error', data.error);
                }
            } catch (error) {
                hideLoadingScreen();
                showError('verify-error', 'Connection error. Please try again.');
            }
        });
        
        // Handle reset form submission
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('user-id').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showError('reset-error', 'Passwords do not match');
                return;
            }
            
            showLoadingScreen();
            
            try {
                const response = await fetch(`${API_URL}/auth/forgot-password/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId, 
                        newPassword, 
                        confirmPassword 
                    })
                });
                
                const data = await response.json();
                
                hideLoadingScreen();
                
                if (response.ok) {
                    showSuccess('reset-success', 'Password reset successfully! Redirecting to login...');
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showError('reset-error', data.error);
                }
            } catch (error) {
                hideLoadingScreen();
                showError('reset-error', 'Connection error. Please try again.');
            }
        });
    </script>
</body>
</html>
